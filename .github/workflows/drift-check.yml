name: drift-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify LICENSE is MIT
        run: |
          grep -q "MIT License" LICENSE || { echo "DRIFT: LICENSE is not MIT"; exit 1; }

      - name: Verify Tier 2 CLAUDE.md exists
        run: |
          test -f CLAUDE.md || { echo "DRIFT: CLAUDE.md missing"; exit 1; }

      - name: Verify spec.md exists
        run: |
          test -f spec.md || { echo "DRIFT: spec.md missing"; exit 1; }

      - name: Verify Memory Bank has 5 Cline-pattern files
        run: |
          expected=(logbook activeContext decisionLog productContext systemPatterns)
          for f in "${expected[@]}"; do
            test -f "memory_bank/${f}.md" || { echo "DRIFT: memory_bank/${f}.md missing"; exit 1; }
          done

      - name: Verify drift-check workflow self-reference
        run: |
          test -f .github/workflows/drift-check.yml || { echo "DRIFT: self workflow missing"; exit 1; }

      - name: Verify README declares current phase
        run: |
          grep -qE "^\*\*Phase [0-9]+\*\*" README.md || { echo "DRIFT: README missing Phase declaration"; exit 1; }

      - name: Verify .gitignore covers secrets
        run: |
          grep -q "^\.env$" .gitignore || { echo "DRIFT: .gitignore does not exclude .env"; exit 1; }
          grep -q "chrome_profile/" .gitignore || { echo "DRIFT: .gitignore missing chrome_profile/"; exit 1; }

      - name: Verify Selected under thesis section (constraint-optimized framing)
        run: |
          grep -q "## Selected under" README.md || { echo "DRIFT: README missing Selected under section"; exit 1; }
          grep -q "Zero credit card" README.md || { echo "DRIFT: README missing zero credit card constraint"; exit 1; }
          grep -q "Consumer laptop only" README.md || { echo "DRIFT: README missing consumer laptop constraint"; exit 1; }
          grep -q "Public source / OSS only" README.md || { echo "DRIFT: README missing public source constraint"; exit 1; }
          grep -q "Drift-CI enforced" README.md || { echo "DRIFT: README missing drift-CI constraint"; exit 1; }
          grep -q "constraint-optimized AI engineering" README.md || { echo "DRIFT: README missing portfolio category line"; exit 1; }

      - name: Verify Why this is the literal best section (option-space audit evidence)
        run: |
          grep -q "Why this is the literal best" README.md || { echo "DRIFT: README missing Why best section"; exit 1; }
          grep -q "Rejected alternatives" README.md || { echo "DRIFT: README missing rejected alternatives table column"; exit 1; }

      - name: Verify pyproject.toml exists with project metadata
        run: |
          test -f pyproject.toml || { echo "DRIFT: pyproject.toml missing"; exit 1; }
          grep -q "name = \"browser-agent-demo\"" pyproject.toml || { echo "DRIFT: pyproject.toml name mismatch"; exit 1; }
          grep -q "requires-python" pyproject.toml || { echo "DRIFT: pyproject.toml missing requires-python"; exit 1; }

      - name: Verify Dependabot config (pip ecosystem)
        run: |
          test -f .github/dependabot.yml || { echo "DRIFT: dependabot.yml missing"; exit 1; }
          grep -q "package-ecosystem: \"pip\"" .github/dependabot.yml || { echo "DRIFT: dependabot.yml missing pip ecosystem"; exit 1; }

      - name: Verify pip-audit declared in dev-dependencies
        run: |
          grep -q "pip-audit" pyproject.toml || { echo "DRIFT: pyproject.toml missing pip-audit (supply chain defense)"; exit 1; }

      - name: Summary
        run: echo "All drift checks passed."

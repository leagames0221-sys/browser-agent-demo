name: drift-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify LICENSE is MIT
        run: |
          grep -q "MIT License" LICENSE || { echo "DRIFT: LICENSE is not MIT"; exit 1; }

      - name: Verify Tier 2 CLAUDE.md exists
        run: |
          test -f CLAUDE.md || { echo "DRIFT: CLAUDE.md missing"; exit 1; }

      - name: Verify spec.md exists
        run: |
          test -f spec.md || { echo "DRIFT: spec.md missing"; exit 1; }

      - name: Verify Memory Bank has 5 Cline-pattern files
        run: |
          expected=(logbook activeContext decisionLog productContext systemPatterns)
          for f in "${expected[@]}"; do
            test -f "memory_bank/${f}.md" || { echo "DRIFT: memory_bank/${f}.md missing"; exit 1; }
          done

      - name: Verify drift-check workflow self-reference
        run: |
          test -f .github/workflows/drift-check.yml || { echo "DRIFT: self workflow missing"; exit 1; }

      - name: Verify README declares current phase
        run: |
          grep -qE "^\*\*Phase [0-9]+\*\*" README.md || { echo "DRIFT: README missing Phase declaration"; exit 1; }

      - name: Verify .gitignore covers secrets
        run: |
          grep -q "^\.env$" .gitignore || { echo "DRIFT: .gitignore does not exclude .env"; exit 1; }
          grep -q "chrome_profile/" .gitignore || { echo "DRIFT: .gitignore missing chrome_profile/"; exit 1; }

      - name: Verify Selected under thesis section (constraint-optimized framing)
        run: |
          grep -q "## Selected under" README.md || { echo "DRIFT: README missing Selected under section"; exit 1; }
          grep -q "Zero credit card" README.md || { echo "DRIFT: README missing zero credit card constraint"; exit 1; }
          grep -q "Consumer laptop only" README.md || { echo "DRIFT: README missing consumer laptop constraint"; exit 1; }
          grep -q "Public source / OSS only" README.md || { echo "DRIFT: README missing public source constraint"; exit 1; }
          grep -q "Drift-CI enforced" README.md || { echo "DRIFT: README missing drift-CI constraint"; exit 1; }
          grep -q "constraint-optimized AI engineering" README.md || { echo "DRIFT: README missing portfolio category line"; exit 1; }

      - name: Verify Why this is the literal best section (option-space audit evidence)
        run: |
          grep -q "Why this is the literal best" README.md || { echo "DRIFT: README missing Why best section"; exit 1; }
          grep -q "Rejected alternatives" README.md || { echo "DRIFT: README missing rejected alternatives table column"; exit 1; }

      - name: Verify pyproject.toml exists with project metadata
        run: |
          test -f pyproject.toml || { echo "DRIFT: pyproject.toml missing"; exit 1; }
          grep -q "name = \"browser-agent-demo\"" pyproject.toml || { echo "DRIFT: pyproject.toml name mismatch"; exit 1; }
          grep -q "requires-python" pyproject.toml || { echo "DRIFT: pyproject.toml missing requires-python"; exit 1; }

      - name: Verify Dependabot config (pip ecosystem)
        run: |
          test -f .github/dependabot.yml || { echo "DRIFT: dependabot.yml missing"; exit 1; }
          grep -q "package-ecosystem: \"pip\"" .github/dependabot.yml || { echo "DRIFT: dependabot.yml missing pip ecosystem"; exit 1; }

      - name: Verify pip-audit declared in dev-dependencies
        run: |
          grep -q "pip-audit" pyproject.toml || { echo "DRIFT: pyproject.toml missing pip-audit (supply chain defense)"; exit 1; }

      - name: Verify Honest results section populated with baseline data
        run: |
          grep -q "Phase 1 baseline run #1" README.md || { echo "DRIFT: README missing Phase 1 baseline run #1 entry"; exit 1; }
          test -f artifacts/baseline.json || { echo "DRIFT: artifacts/baseline.json missing (JSON evidence required)"; exit 1; }
          grep -q "qwen2.5:7b" artifacts/baseline.json || { echo "DRIFT: baseline.json missing model field"; exit 1; }

      - name: Verify Phase 2 baseline_v2 evidence (Layer 1 defense)
        run: |
          grep -q "Phase 2 baseline_v2" README.md || { echo "DRIFT: README missing Phase 2 baseline_v2 entry"; exit 1; }
          test -f artifacts/baseline_v2.json || { echo "DRIFT: artifacts/baseline_v2.json missing (Layer 1 evidence required)"; exit 1; }
          grep -q "\"version\": \"v2\"" artifacts/baseline_v2.json || { echo "DRIFT: baseline_v2.json missing version field"; exit 1; }
          grep -q "max_steps=2" artifacts/baseline_v2.json || { echo "DRIFT: baseline_v2.json missing Layer 1 defense markers"; exit 1; }

      - name: Verify Phase 2 baseline_v3 evidence (Layer 1 + Layer 2 defense)
        run: |
          grep -q "Phase 2 baseline_v3" README.md || { echo "DRIFT: README missing Phase 2 baseline_v3 entry"; exit 1; }
          test -f artifacts/baseline_v3.json || { echo "DRIFT: artifacts/baseline_v3.json missing (Layer 2 evidence required)"; exit 1; }
          grep -q "\"version\": \"v3\"" artifacts/baseline_v3.json || { echo "DRIFT: baseline_v3.json missing version field"; exit 1; }
          grep -q "schema_compliant" artifacts/baseline_v3.json || { echo "DRIFT: baseline_v3.json missing schema_compliant field"; exit 1; }

      - name: Verify Phase 2 baseline_v4 evidence (Layer 1+2+3 Plan-Execute)
        run: |
          grep -q "Phase 2 baseline_v4" README.md || { echo "DRIFT: README missing Phase 2 baseline_v4 entry"; exit 1; }
          test -f artifacts/baseline_v4.json || { echo "DRIFT: artifacts/baseline_v4.json missing (Layer 3 evidence required)"; exit 1; }
          grep -q "\"version\": \"v4\"" artifacts/baseline_v4.json || { echo "DRIFT: baseline_v4.json missing version field"; exit 1; }
          grep -q "Plan-Execute" artifacts/baseline_v4.json || { echo "DRIFT: baseline_v4.json missing Plan-Execute marker"; exit 1; }

      - name: Verify Phase 2 baseline_v5 evidence (Layer 1+2+3+5 frontier fallback)
        run: |
          grep -q "Phase 2 baseline_v5" README.md || { echo "DRIFT: README missing Phase 2 baseline_v5 entry"; exit 1; }
          test -f artifacts/baseline_v5.json || { echo "DRIFT: artifacts/baseline_v5.json missing (Layer 5 evidence required)"; exit 1; }
          grep -q "\"version\": \"v5\"" artifacts/baseline_v5.json || { echo "DRIFT: baseline_v5.json missing version field"; exit 1; }
          grep -q "github-models-free-tier" artifacts/baseline_v5.json || { echo "DRIFT: baseline_v5.json missing GitHub Models host marker"; exit 1; }
          grep -q "credit_card_required" artifacts/baseline_v5.json || { echo "DRIFT: baseline_v5.json missing credit_card_required field"; exit 1; }

      - name: Summary
        run: echo "All drift checks passed."
